<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>本院用藥查詢系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px;display:flex;flex-direction:column;min-height:100vh}
header{background:#1a4f8a;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:500}
header span{font-size:12px;opacity:.75;margin-left:auto}
.layout{display:flex;flex:1;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:#fff;border-right:1px solid #e0e0e0;flex-shrink:0;overflow-y:auto;padding:12px 0}
.sidebar h3{font-size:11px;font-weight:600;color:#888;letter-spacing:.8px;text-transform:uppercase;padding:8px 16px 4px}
.sidebar-item{display:flex;justify-content:space-between;align-items:center;padding:7px 16px;cursor:pointer;transition:background .12s;font-size:13px;color:#444;border-left:3px solid transparent}
.sidebar-item:hover{background:#f0f4fa;color:#1a4f8a}
.sidebar-item.active{background:#e8f0fb;color:#1a4f8a;border-left-color:#1a4f8a;font-weight:500}
.sidebar-item .cnt{font-size:11px;color:#aaa;background:#f0f0f0;border-radius:10px;padding:1px 7px}
.sidebar-item.active .cnt{background:#c8d9f5;color:#1a4f8a}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{background:#fff;padding:12px 20px;border-bottom:1px solid #e0e0e0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{height:36px;border:1px solid #d0d0d0;border-radius:6px;padding:0 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.toolbar input:focus,.toolbar select:focus{border-color:#1a4f8a;box-shadow:0 0 0 3px rgba(26,79,138,.1)}
#kw{flex:1;min-width:160px}
#cat{width:220px}
.badge-preg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.preg-A,.preg-B{background:#d4edda;color:#155724}
.preg-C{background:#fff3cd;color:#856404}
.preg-D,.preg-X{background:#f8d7da;color:#721c24}
.results-bar{padding:8px 20px;font-size:12px;color:#888;border-bottom:1px solid #eee;background:#fafafa}
.drug-list{flex:1;overflow-y:auto;padding:12px 20px}
.drug-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;display:flex;gap:14px;align-items:flex-start}
.drug-card:hover{border-color:#1a4f8a;box-shadow:0 2px 8px rgba(26,79,138,.1)}
.drug-card.selected{border-color:#1a4f8a;border-width:2px;background:#fafcff}
.drug-id{width:36px;height:36px;background:#e8f0fb;color:#1a4f8a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.drug-body{flex:1;min-width:0}
.drug-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.drug-name{font-weight:600;font-size:14px;color:#1a1a1a}
.drug-cname{font-size:13px;color:#444}
.drug-generic{font-size:11px;color:#888}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#555}
.tag-cat{background:#e8f0fb;color:#1a4f8a}
.indication-preview{font-size:12px;color:#666;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{padding:4rem;text-align:center;color:#aaa}
.detail-panel{position:fixed;top:0;right:-520px;width:520px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.12);overflow-y:auto;z-index:200;transition:right .25s ease;display:flex;flex-direction:column}
.detail-panel.open{right:0}
.detail-header{background:#1a4f8a;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:10}
.detail-title{font-size:16px;font-weight:600;margin-bottom:2px}
.detail-sub{font-size:12px;opacity:.8}
.detail-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;line-height:28px;text-align:center}
.detail-close:hover{background:rgba(255,255,255,.3)}
.detail-body{padding:20px;flex:1}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.field{margin-bottom:16px;border-bottom:1px solid #f0f0f0;padding-bottom:14px}
.field:last-child{border-bottom:none}
.field-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field-val{font-size:13px;color:#222;line-height:1.7}
.field-val.warn{color:#cc6600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none}
.overlay.show{display:block}
.alpha-bar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 16px}
.alpha-btn{padding:4px 8px;font-size:12px;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;background:#fff;color:#444;transition:all .12s}
.alpha-btn:hover{border-color:#1a4f8a;color:#1a4f8a}
.alpha-btn.active{background:#1a4f8a;color:#fff;border-color:#1a4f8a}

/* 網頁底部頁尾（Footer）樣式 */
footer{background:#fff;padding:16px 24px;text-align:center;border-top:1px solid #e0e0e0;font-size:12px;color:#aaa}
footer a.lnk-admin{color:#aaa;text-decoration:none;transition:color .15s;font-size:12px}
footer a.lnk-admin:hover{color:#888;text-decoration:underline}

@media(max-width:700px){
  .sidebar{display:none}
  .detail-panel{width:100vw}
}
</style>
</head>

的鹼性苦味酸鹽鑑定法。4.少數病患會有陽性COOMBS’效應，可能干擾血型的交叉試驗。長期使用可能導致非感染性細菌過度生長，此時應評估患者情況，採取停藥或使用其他適當方法。", "indication": "抗生素", "sideEffect": "", "preg": "B", "appearance": "小玻璃瓶", "note": "此藥須檢附微生物培養及藥物敏感試驗之檢驗報告", "cat": "01.02頭孢子菌類", "cat2": "", "cat3": ""}];

let currentGroup = '';
let currentAlpha = '';

function init(){
  const groups = {};
  DRUGS.forEach(d=>{ if(d.cat) groups[d.cat] = (groups[d.cat]||0)+1; });
  
  document.getElementById('cnt-all').textContent = DRUGS.length;
  const list = document.getElementById('group-list');
  list.innerHTML = Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).map(([g,c])=>`
    <div class="sidebar-item" data-group="${g}" onclick="setGroup(this)">
      ${g.substring(5)} <span class="cnt">${c}</span>
    </div>
  `).join('');

  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  document.getElementById('alpha-bar').innerHTML = `
    <button class="alpha-btn active" onclick="setAlpha(this,'')">全部</button>
    ${[...letters].map(l=>`<button class="alpha-btn" onclick="setAlpha(this,'${l}')">${l}</button>`).join('')}
  `;
  render();
}

function setGroup(el){
  document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  currentGroup = el.getAttribute('data-group');
  render();
}

function setAlpha(el, l){
  document.querySelectorAll('.alpha-btn').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  currentAlpha = l;
  render();
}

function render(){
  // 單一輸入框整合搜尋：藥名、學名、商品名、中文名、適應症
  const q = document.getElementById('kw').value.trim().toLowerCase();
  const catFilter = document.getElementById('cat').value;

  const filtered = DRUGS.filter(d=>{
    if(currentGroup && d.cat !== currentGroup) return false;
    if(catFilter && d.cat !== catFilter) return false;
    if(currentAlpha && (!d.idx1 || !d.idx1.startsWith(currentAlpha))) return false;
    
    if(q){
      const matchText = [d.drug, d.name, d.generic, d.brand, d.cname, d.trade, d.indication]
        .filter(Boolean).join(' ').toLowerCase();
      if(!matchText.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('results-bar').textContent = `找到 ${filtered.length} 筆結果`;
  const list = document.getElementById('drug-list');
  if(!filtered.length){
    list.innerHTML = `<div class="empty">找不到符合條件的藥品</div>`;
    return;
  }

  list.innerHTML = filtered.map(d=>`
    <div class="drug-card" onclick="showDetail(${d.id})">
      <div class="drug-id">${d.id}</div>
      <div class="drug-body">
        <div class="drug-top">
          <span class="drug-name">${d.cname || d.trade || '無中文名'}</span>
          <span class="drug-cname">${d.brand || ''}</span>
          <span class="drug-generic">${d.generic || ''}</span>
        </div>
        <div class="tags">
          ${d.cat?`<span class="tag tag-cat">${d.cat}</span>`:''}
          ${d.preg?`<span class="badge-preg ${pregClass(d.preg)}">孕 ${d.preg}</span>`:''}
        </div>
        <div class="indication-preview">${d.indication ? '🎯 適應症：' + d.indication : '暫無適應症資料'}</div>
      </div>
    </div>
  `).join('');
}

function pregClass(p){
  return 'preg-'+p.toUpperCase();
}

function showDetail(id){
  const d = DRUGS.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('dp-title').textContent = d.drug;
  document.getElementById('dp-sub').textContent = [d.generic, d.brand, d.cname].filter(Boolean).join(' ／ ');
  const fields = [
    ['適應症', d.indication, ''],
    ['用法用量', d.dosage, ''],
    ['藥理作用', [d.pharm,d.cat,d.cat2,d.cat3].filter(Boolean).join('；'), ''],
    ['副作用', d.sideEffect, ''],
    ['注意事項', d.caution, 'warn'],
    ['外觀', d.appearance, ''],
    ['商品名 / 原廠', [d.trade,d.brand].filter(Boolean).join(' / '), ''],
    ['索引代碼', [d.idx1,d.idx2,d.idx3].filter(Boolean).join(' / '), ''],
    ['備註', d.note, ''],
  ].filter(f=>f[1]);
  document.getElementById('dp-body').innerHTML = `
    <div class="detail-tags">
      ${d.cat?`<span class="tag tag-cat">${d.cat}</span>`:''}\n      ${d.preg?`<span class="badge-preg ${pregClass(d.preg)}">孕婦 ${d.preg} 級</span>`:''}\n    </div>\n    ${fields.map(f=>`\n      <div class="field">\n        <div class=\"field-label\">${f[0]}</div>\n        <div class=\"field-val${f[2]?' '+f[2]:''}\">\n          ${f[1].replace(/\n/g,'<br>')}
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('detail-panel').classList.remove('open');
}

window.onload = init;
</script>
