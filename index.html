<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>本院用藥查詢系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
header{background:#1a4f8a;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:500}
header span{font-size:12px;opacity:.75;margin-left:auto}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:#fff;border-right:1px solid #e0e0e0;flex-shrink:0;overflow-y:auto;padding:12px 0}
.sidebar h3{font-size:11px;font-weight:600;color:#888;letter-spacing:.8px;text-transform:uppercase;padding:8px 16px 4px}
.sidebar-item{display:flex;justify-content:space-between;align-items:center;padding:7px 16px;cursor:pointer;transition:background .12s;font-size:13px;color:#444;border-left:3px solid transparent}
.sidebar-item:hover{background:#f0f4fa;color:#1a4f8a}
.sidebar-item.active{background:#e8f0fb;color:#1a4f8a;border-left-color:#1a4f8a;font-weight:500}
.sidebar-item .cnt{font-size:11px;color:#aaa;background:#f0f0f0;border-radius:10px;padding:1px 7px}
.sidebar-item.active .cnt{background:#c8d9f5;color:#1a4f8a}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{background:#fff;padding:12px 20px;border-bottom:1px solid #e0e0e0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{height:36px;border:1px solid #d0d0d0;border-radius:6px;padding:0 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.toolbar input:focus,.toolbar select:focus{border-color:#1a4f8a;box-shadow:0 0 0 3px rgba(26,79,138,.1)}
#kw{flex:1;min-width:160px}
#ind{width:200px}
#cat{width:220px}
.badge-preg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.preg-A,.preg-B{background:#d4edda;color:#155724}
.preg-C{background:#fff3cd;color:#856404}
.preg-D,.preg-X{background:#f8d7da;color:#721c24}
.toolbar .btn-admin{margin-left:auto;height:36px;padding:0 16px;background:#1a4f8a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.toolbar .btn-admin:hover{background:#15407a}
.results-bar{padding:8px 20px;font-size:12px;color:#888;border-bottom:1px solid #eee;background:#fafafa}
.drug-list{flex:1;overflow-y:auto;padding:12px 20px}
.drug-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;display:flex;gap:14px;align-items:flex-start}
.drug-card:hover{border-color:#1a4f8a;box-shadow:0 2px 8px rgba(26,79,138,.1)}
.drug-card.selected{border-color:#1a4f8a;border-width:2px;background:#fafcff}
.drug-id{width:36px;height:36px;background:#e8f0fb;color:#1a4f8a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.drug-body{flex:1;min-width:0}
.drug-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.drug-name{font-weight:600;font-size:14px;color:#1a1a1a}
.drug-cname{font-size:13px;color:#444}
.drug-generic{font-size:11px;color:#888}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#555}
.tag-cat{background:#e8f0fb;color:#1a4f8a}
.indication-preview{font-size:12px;color:#666;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{padding:4rem;text-align:center;color:#aaa}
.detail-panel{position:fixed;top:0;right:-520px;width:520px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.12);overflow-y:auto;z-index:200;transition:right .25s ease;display:flex;flex-direction:column}
.detail-panel.open{right:0}
.detail-header{background:#1a4f8a;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:10}
.detail-title{font-size:16px;font-weight:600;margin-bottom:2px}
.detail-sub{font-size:12px;opacity:.8}
.detail-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;line-height:28px;text-align:center}
.detail-close:hover{background:rgba(255,255,255,.3)}
.detail-body{padding:20px;flex:1}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.field{margin-bottom:16px;border-bottom:1px solid #f0f0f0;padding-bottom:14px}
.field:last-child{border-bottom:none}
.field-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field-val{font-size:13px;color:#222;line-height:1.7}
.field-val.warn{color:#cc6600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none}
.overlay.show{display:block}
.alpha-bar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 16px}
.alpha-btn{padding:4px 8px;font-size:12px;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;background:#fff;color:#444;transition:all .12s}
.alpha-btn:hover{border-color:#1a4f8a;color:#1a4f8a}
.alpha-btn.active{background:#1a4f8a;color:#fff;border-color:#1a4f8a}
@media(max-width:700px){
  .sidebar{display:none}
  .detail-panel{width:100vw}
}
</style>
</head>

顆膠囊），隨後每次服用2顆膠囊，一天一次，總計28-35天。", "caution": "服藥時須將膠囊整顆吞服，不能剝開、咬碎或取出膠囊內藥粒，以免增加出血風險。\n若未在預定的時間服用PRADAXA，應於當天盡快服用該劑藥物，若未能在下一劑之前至少6小時補服藥物，即應跳過該劑，切勿為了補服錯過的一劑而將下一劑PRADAXA的劑量加倍。", "indication": "用於靜脈血栓高危險群病患，以預防其於接受下肢重大骨科手術後之靜脈血栓栓塞症 (VTE)。\n2. 預防非瓣膜性心房纖維顫動病患發生中風與全身性栓塞。\n3. 急性深層靜脈血栓 (DVT) 及/或肺栓塞 (PE) 之治療", "sideEffect": "出血、腹痛、噁心。", "preg": "C", "appearance": "上蓋藍色/下蓋藍色/膠囊(印字：R110)", "note": "", "cat": "", "cat2": "", "cat3": ""}, {"id": 34, "drug": "Flumazenil(Anexate) Inj. 0.5mg/5ml/Amp", "name": "*Flumazenil(Anexate) Inj. 0.5mg/5ml/Amp", "generic": "Flumazenil", "brand": "Anexate", "cname": "安易醒注射液", "trade": "Anexate", "idx1": "FLU", "idx2": "ANE", "idx3": "", "pharm": "具有微弱的內因性催動作用，例如抗痙攣性。", "dosage": "麻醉：建議初劑量為靜脈注射0.2mg。1.15秒內注射完畢，若第一次靜脈注射後在60秒內未達到合乎要求的意識程度，可注射第二次劑量0.1mg。2.在使用前數過長期使用Benzodiazepine之患者，快速注射會產生 \n斷癮症狀。3.加護病房一建議初劑量是0.3mg。4.加護病房中，治療長期用高劑量Benzodiazepine之患者， \n緩慢注射5mg Diazepam或5mg Midazolam。", "caution": "不可用於已知對本品過敏之患者。對門診患者之駕駛及其他精神運動行為之作用。如操作具危險性機器、開車時，應極小心。", "indication": "中樞鎮靜作用", "sideEffect": "面色潮紅.噁心.嘔吐.眩暈.鎮靜.心悸.焦慮。", "preg": "C", "appearance": "小安培", "note": "", "cat": "16.01解毒劑", "cat2": "", "cat3": ""}, {"id": 35, "drug": "Furosemide(Rasitol)Inj. 20mg/2ml/Amp", "name": "*Furosemide(Rasitol) Inj. 20mg/2ml/Amp", "generic": "Furosemide", "brand": "Lasix", "cname": "來喜妥注射液", "trade": "Rasitol", "idx1": "FUR", "idx2": "LAS", "idx3": "RAS", "pharm": "本藥為強力的「利尿劑」，幫助腎臟將體內多餘水分，經由尿液排出，達到治療目的。可用來預防高血壓、充血性心衰竭、消除水腫。", "dosage": "(1)成人及15歲以上青少年：初始劑量為靜脈或肌肉注射20～40mg(即1～2Amp)。(2)15歲以下孩童：唯有在危急生命時，才能注射給藥(必要時以持續滴注)。", "caution": "", "indication": "利尿、高血壓", "sideEffect": "起立性低血壓、便秘、嘔吐、噁心。", "preg": "C", "appearance": "小安培", "note": "", "cat": "07.01利尿劑", "cat2": "", "cat3": ""}, {"id": 36, "drug": "Gentamycin(V-Genta) Inj. 80mg/2ml/Vial", "name": "*Gentamycin(V-Genta) Inj. 80mg/2ml/Vial", "generic": "Gentamycin", "brand": "Garamycin", "cname": "維建注射液", "trade": "V-Genta", "idx1": "GEN", "idx2": "GAR", "idx3": "GM\n", "pharm": "本藥品為AMICNGLYCOSIDE系列的抗生素，對革蘭氏陽性、陰性菌、立克次氏體 2": "CAL", "idx3": "GLU", "pharm": "供應鈣離子，鈣為調節神經，血液凝結，心臟功能，維持正常生理功能，骨骼和牙齒的必需元素，同時也調節神經傳導素和荷爾蒙之釋出與貯存，調節胺基酸和維他命B12之攝取與吸收，胃分泌激素之分泌，維持細胞膜和毛細管構造和功能之完整，增加心臟肌肉張力和心收縮力。", "dosage": "靜注、緩慢注射。", "caution": "靜注鈣必需以小口徑針緩慢注入大靜脈，以避免外摻和造成壞死的可能，若孩童給藥避免使用頭皮靜脈。必需處方靜注流速，高濃度的鈣突然到達心臟會造成致命的心停止。在靜注給藥時，應監測心電圖以發現高鈣血症之跡象。直接靜脈注射會伴有皮膚燒灼感和末梢血管擴張作用，血壓中等度的下降，若患者有任何不適之訴說時應即停止注射，在注射時患者留在床上半小時~1小時或更久，視反應情況而定。觀察靜注部位，外滲會造成組織刺激和壞死。不推荐使用肌注途徑，對孩童為禁忌使用，因會導致膿腫形成。", "indication": "低鈣血症、痙攣、高鉀血症", "sideEffect": "便秘、靜脈血栓、心律不整、高血壓、昏睡、肌肉無力。", "preg": "C", "appearance": "安培", "note": "高危險藥物", "cat": "10.03骨質疏鬆治療劑", "cat2": "", "cat3": ""}, {"id": 455, "drug": "Digoxin(Lanoxin) Inj. 0.25mg/1ml/Amp", "name": "!*Digoxin(Lanoxin) Inj. 0.25mg/1ml/Amp", "generic": "Digoxin", "brand": "Digoxin", "cname": "隆我心注射劑", "trade": "Lanoxin", "idx1": "LAN", "idx2": "DIG", "idx3": "", "pharm": "本藥是由柔毛洋地黃（Digitalis Lanate）的葉子中取得。它可增加心臟的收縮力，降低心跳速率（延長房室結的不反應期），減輕心臟衰竭的臨床徵兆和症狀（如靜脈充血、末梢水腫等）。", "dosage": "劑量應視個人需要小心調整。", "caution": "服用本品患者應密切監測，以防過量引起不良反應。使用洋地黃病患不可注射鈣。若有肺性心臟病（Cor Pulmonale）、冠狀動脈不全、電解質不平衡、腎臟或肝臟機能不全時，應酌情減低劑量。老年患者可能出現上述狀況，因此需小心調整劑量。由於老年人肌肉量減少，肌酸酐生成量減低，腎機能不全時，其血清肝酸酐值可能仍為正常。對於嚴重腎衰竭的患者，在開始治療期間應每隔兩星期左右，測定一次Digoxin血清濃度。", "indication": "心衰竭，心搏過速", "sideEffect": "", "preg": "C", "appearance": "小安培", "note": "高危險藥物", "cat": "05.01強心劑", "cat2": "", "cat3": ""}, {"id": 456, "drug": "Dobutamine(Gendobu) Inj. 250mg/20ml/Vail", "name": "!*Dobutamine(Gendobu) Inj. 250mg/20ml/Vail", "generic": "Dobutamine", "brand": "Dobutrex", "cname": "健多博注射液", "trade": "Gendobu", "idx1": "GEN", "idx2": "DOB", "idx3": "BUT", "pharm": "增加心肌收縮力。", "dosage": "通常每分鐘2.5～10mcg／kg。要改善血流狀況時，劑量須超過20mcg／kg。", "caution": "使用時應仔細檢查心跳速度與節奏，動脈壓及注入速度。初次用藥時，最好以心電圖做監視直到反應穩定為止。使用劑量應加以滴定，以預防心縮壓及心跳速率額外增加。使用本藥可幫助配合低血壓回復正常。孩童使用時易增加心跳速度及血壓。", "indication": "增強心肌收縮力", "sideEffect": "心律增加，血壓增高、心絞痛、心悸、呼吸困難。", "preg": "B", "appearance": "小安培", "note": "高危險藥物", "cat": "05.06低血壓和休克治療劑", "cat2": "", "cat3": ""}, {"id": 457, "drug": "Dopamin(Easydopa)Inj. 400mg/250ml/Bag", "name": ，以及臨床整體評估表 (CGI) 之分數。(2)經規則使用六至八週後，需整體評估其療效，並於病歷記載：臨床整體評估表之分數。(3)日劑量超過6 mg/day時，需於病歷記載理由", "cat": "02.03抗精神病藥物", "cat2": "", "cat3": ""}, {"id": 537, "drug": "Anoro Ellipta 30Dose/BT", "name": "Anoro Ellipta 30Dose/BT", "generic": "Umeclidinium & Vilanterol", "brand": "Anoro", "cname": "安肺樂易利達乾粉吸入劑", "trade": "Anoro", "idx1": "ANO", "idx2": "UME", "idx3": "VIL", "pharm": "ANORO ELLIPTA 含有 umeclidinium 與 vilanterol 兩種成分。\nUmeclidinium 是一種長效型抗毒蕈鹼藥物，通常又稱為抗膽鹼藥物。其對毒蕈鹼受體亞型 M1 至 M5 的親和力大致相同。本品在氣道中產生藥理作用的方式透過抑制平滑肌上的 M3 接受體，從而導致支氣管擴張。\nVilanterol 是一種 LABA。體外試驗顯示，vilanterol 的功能選擇性與 salmeterol 類似。", "dosage": "1. 應以每天吸入 一次的方式投藥，且僅可經口吸入。\n2. 應每天於相同時間投藥。每24小時不可使用超過 1次。\n3. 對老年患者、腎功能受損患者或中度肝功能受損患者，都不須調整劑量。", "caution": "ANORO ELLIPTA 的使用頻率不可超過建議使用頻率，使用劑量不可高於建議劑量，也不可與其他含有 LABA 成分的藥物併用，因為可能會導致用藥過量。", "indication": "慢性阻塞性肺病(COPD)患者之氣道阻塞症狀的維持治療。", "sideEffect": "咽炎、鼻竇炎、下呼吸道感染、便秘、腹瀉。", "preg": "C", "appearance": "罐狀", "note": "", "cat": "09.04支氣管擴張劑和抗氣喘藥物", "cat2": "", "cat3": ""}, {"id": 538, "drug": "Relvar Ellipta 30Doses/BT", "name": "Relvar Ellipta 30Doses/BT", "generic": "Fluticasone & Vilanterol", "brand": "Relvar", "cname": "潤娃易利達乾粉吸入劑", "trade": "Relvar", "idx1": "REL", "idx2": "FLU", "idx3": "VIL", "pharm": "Fluticasone Furoate：Fluticasone furoate是一種合成的三氟化皮質類固醇，具有抗發炎的作用。\nVilanterol：Vilanterol是一種LABA。\nβ2腎上腺素接受體作用劑(包括vilanterol)的藥理作用至少有一部份可歸因於對細胞內腺苷酸環化酶的刺激作用，此酵素可催化腺苷三磷酸(ATP)轉化成3’,5’環腺苷單磷酸(環AMP)的作用。環AMP濃度升高會導致支氣管平滑肌鬆弛，並會抑制立即性過敏反應媒介物自細胞(尤其是肥大細胞)中釋出的作用。", "dosage": "RELVAR ELLIPTA 92 mcg/22 mcg (遞送劑量)應以每天吸入一次的方式投藥，且僅可經口吸入。吸入之後，患者應用水漱口，且不可吞下，這是為了幫助降低發生口咽念珠菌病的風險。\nRELVAR ELLIPTA應每天於相同時間投藥。每24小時不可使用RELVAR ELLIPTA超過1次。", "caution": "對病情正在快速惡化或發生可能危及生命之發作事件的COPD患者，不可開始使用本品。", "indication": "1.慢性阻塞性肺病(COPD)患者之氣道阻塞症狀的維持治療。\n2.降低有惡化病史患者之COPD惡化。重要使用限制：RELVAR ELLIPTA並不適用於緩解急性支氣管痙攣或治療氣喘。", "sideEffect": "咽炎，鼻竇炎，上呼吸道感染。", "preg": "C", "appearance": "罐狀", "note": "", "cat": "09.04支氣管擴張劑和抗氣喘藥物", "cat2": "", "cat3": ""}, {"id": 539, "drug": "Augmentin(Curam) 1000mg/Tab", "name": "Augmentin(Cu const GROUP_NAMES = {"01": "抗感染藥物", "02": "神經/精神科", "03": "麻醉藥物", "04": "止痛/抗炎", "05": "心血管", "06": "血液/造血", "07": "利尿劑", "08": "消化系統", "09": "呼吸系統", "10": "內分泌/代謝", "11": "抗組織胺/過敏", "12": "維他命", "13": "營養製劑", "14": "皮膚用藥", "15": "眼科用藥", "16": "解毒劑"};

let selectedId = null;
let currentGroup = '';
let currentAlpha = '';

function getGroup(d){
  const m = d.cat.match(/^(\d+)\./);
  return m ? m[1] : '';
}

function buildSidebar(){
  const groupCount = {};
  DRUGS.forEach(d => {
    const g = getGroup(d);
    if(g) groupCount[g] = (groupCount[g]||0)+1;
  });
  document.getElementById('cnt-all').textContent = DRUGS.length;
  const gl = document.getElementById('group-list');
  gl.innerHTML = Object.keys(GROUP_NAMES).sort().map(g => `
    <div class="sidebar-item" data-group="${g}" onclick="setGroup(this)">
      ${g}. ${GROUP_NAMES[g] || ''} <span class="cnt">${groupCount[g]||0}</span>
    </div>
  `).join('');
}

function buildAlphaBar(){
  const filtered = getFiltered(false);
  const alphas = [...new Set(filtered.map(d => d.idx1 ? d.idx1[0] : '').filter(Boolean))].sort();
  const bar = document.getElementById('alpha-bar');
  bar.innerHTML = ['全部',...alphas].map(a =>
    `<button class="alpha-btn${currentAlpha===a||(!currentAlpha&&a==='全部')?' active':''}" onclick="setAlpha('${a}')">${a}</button>`
  ).join('');
}

function setGroup(el){
  document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  currentGroup = el.dataset.group;
  currentAlpha = '';
  document.getElementById('cat').value='';
  render();
}

function setAlpha(a){
  currentAlpha = a==='全部' ? '' : a;
  render();
}

function getFiltered(applyAlpha=true){
  const kw = (document.getElementById('kw').value||'').toLowerCase();
  const ind = (document.getElementById('ind').value||'').toLowerCase();
  const cat = document.getElementById('cat').value;
  return DRUGS.filter(d => {
    if(currentGroup && getGroup(d)!==currentGroup) return false;
    if(cat && d.cat!==cat) return false;
    if(applyAlpha && currentAlpha && (d.idx1||'')[0]!==currentAlpha) return false;
    if(kw && ![d.drug,d.name,d.generic,d.brand,d.cname,d.trade].join(' ').toLowerCase().includes(kw)) return false;
    if(ind && !(d.indication||'').toLowerCase().includes(ind)) return false;
    return true;
  });
}

function pregClass(p){
  if(!p) return '';
  if(p==='A'||p==='B') return 'preg-A';
  if(p==='C') return 'preg-C';
  return 'preg-D';
}

function render(){
  buildAlphaBar();
  const filtered = getFiltered(true);
  document.getElementById('results-bar').textContent = `共 ${filtered.length} 筆藥品`;
  const list = document.getElementById('drug-list');
  if(!filtered.length){
    list.innerHTML='<div class="empty">查無符合條件的藥品</div>';
    return;
  }
  list.innerHTML = filtered.slice(0,200).map(d => `
    <div class="drug-card${selectedId===d.id?' selected':''}" onclick="showDetail(${d.id})">
      <div class="drug-id">${d.idx1||'?'}</div>
      <div class="drug-body">
        <div class="drug-top">
          <span class="drug-name">${d.drug}</span>
          <span class="drug-cname">${d.cname}</span>
        </div>
        <div class="tags">
          ${d.cat ? `<span class="tag tag-cat">${d.cat}</span>` : ''}
          ${d.preg ? `<span class="badge-preg ${pregClass(d.preg)}">孕${d.preg}</span>` : ''}
          ${d.note ? '<span class="tag" style="background:#fff3cd;color:#856404">自費</span>' : ''}
        </div>
        <div class="indication-preview">${d.indication||'—'}</div>
      </div>
    </div>
  `).join('');
  if(filtered.length>200){
    list.innerHTML += `<div class="empty" style="padding:1rem">顯示前 200 筆，請縮小搜尋條件查看更多</div>`;
  }
}

function showDetail(id){
  selectedId = id;
  const d = DRUGS.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('dp-title').textContent = d.drug;
  document.getElementById('dp-sub').textContent = [d.generic, d.brand, d.cname].filter(Boolean).join(' ／ ');
  const fields = [
    ['適應症', d.indication, ''],
    ['用法用量', d.dosage, ''],
    ['藥理作用', [d.pharm,d.cat,d.cat2,d.cat3].filter(Boolean).join('；'), ''],
    ['副作用', d.sideEffect, ''],
    ['注意事項', d.caution, 'warn'],
    ['外觀', d.appearance, ''],
    ['商品名 / 原廠', [d.trade,d.brand].filter(Boolean).join(' / '), ''],
    ['索引代碼', [d.idx1,d.idx2,d.idx3].filter(Boolean).join(' / '), ''],
    ['備註', d.note, ''],
  ].filter(f=>f[1]);
  document.getElementById('dp-body').innerHTML = `
    <div class="detail-tags">
      ${d.cat?`<span class="tag tag-cat">${d.cat}</span>`:''}
      ${d.preg?`<span class="badge-preg ${pregClass(d.preg)}">孕婦 ${d.preg} 級</span>`:''}
    </div>
    ${fields.map(f=>`
      <div class="field">
        <div class="field-label">${f[0]}</div>
        <div class="field-val${f[2]?' '+f[2]:''}">
          ${f[1].replace(/\n/g,'<br>')}
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  render();
}

function closeDetail(){
  selectedId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  render();
}

buildSidebar();
render();
document.getElementById('total-badge').textContent = `共 ${DRUGS.length} 筆藥品`;
</script>
</body>
</html>
