<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥品查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-12">

    <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2">
                🔍 藥品查詢系統
            </h1>
            <a href="admin.html" class="text-sm bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition shadow-sm">
                ⚙️ 前往管理後台
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-stretch md:items-center gap-4">
                
                <div class="flex-1 max-w-2xl">
                    <label for="main-search" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">關鍵字搜尋</label>
                    <div class="relative">
                        <input type="text" id="main-search" placeholder="請輸入藥品名稱、學名、商品名、藥理作用或適應症..." 
                               class="border border-slate-300 rounded-lg pl-10 pr-4 py-2.5 text-sm w-full focus:outline-none focus:ring-2 focus:ring-slate-500 bg-slate-50 focus:bg-white transition">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            🔍
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between md:justify-end gap-4 border-t md:border-t-0 pt-4 md:pt-0">
                    <div class="text-right">
                        <span class="text-xs text-slate-400 block">目前顯示</span>
                        <span class="text-lg font-bold text-slate-700" id="search-count">共 0 筆</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 border-b border-slate-200 text-sm font-semibold">
                            <th class="p-4 w-16">ID</th>
                            <th class="p-4">藥品名稱</th>
                            <th class="p-4">中文名</th>
                            <th class="p-4">學名</th>
                            <th class="p-4">分類 (藥理作用)</th>
                            <th class="p-4">適應症</th>
                            <th class="p-4 w-20 text-center">孕婦</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-slate-400">正在載入藥品資料，請稍候...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 儲存從 JSON 讀取到的所有藥品資料
        let currentDrugsData = [];

        // 網頁開啟時，自動讀取同目錄下的 drugs.json
        window.addEventListener('DOMContentLoaded', () => {
            fetch('drugs.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('找不到 drugs.json 檔案，請確認檔案是否存在。');
                    }
                    return response.json();
                })
                .then(data => {
                    currentDrugsData = data;
                    renderTable(currentDrugsData); // 初始渲染所有資料
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('main-table-body').innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center py-12 text-red-500 font-medium">
                                ❌ 讀取資料失敗！請確認 drugs.json 是否已正確上傳至 GitHub 專案中。
                            </td>
                        </tr>
                    `;
                });
        });

        // 監聽【萬能搜尋框】的輸入事件
        document.getElementById('main-search').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase().trim();
            
            // 如果搜尋框是空的，就直接顯示完整的原始資料
            if (!kw) {
                renderTable(currentDrugsData);
                return;
            }
            
            // 多欄位聯集搜尋（OR 邏輯）：只要其中一個欄位有包含關鍵字就算中！
            const filtered = currentDrugsData.filter(d => {
                return [
                    d['藥品名稱'], 
                    d['藥品中文名'], 
                    d['學名名稱'], 
                    d['藥理作用'], 
                    d['適應症']
                ].some(field => (field || '').toString().toLowerCase().includes(kw));
            });
            
            // 渲染過濾後的結果
            renderTable(filtered);
        });

        // 渲染表格的函式
        function renderTable(data) {
            const tbody = document.getElementById('main-table-body');
            
            // 更新畫面上顯示的總筆數
            document.getElementById('search-count').textContent = `共 ${data.length} 筆`;

            // 如果查無資料的顯示
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-slate-400">找不到符合搜尋條件的藥品</td></tr>`;
                return;
            }

            // 產生表格 HTML
            tbody.innerHTML = data.map(drug => {
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-mono text-slate-400">${drug['識別碼'] || ''}</td>
                        <td class="p-4 font-medium text-slate-900">${drug['藥品名稱'] || ''}</td>
                        <td class="p-4 text-slate-700">${drug['藥品中文名'] || ''}</td>
                        <td class="p-4 text-slate-600 text-xs font-mono">${drug['學名名稱'] || ''}</td>
                        <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs">${drug['藥理作用'] || ''}</span></td>
                        <td class="p-4 text-slate-500 max-w-xs truncate" title="${drug['適應症'] || ''}">${drug['適應症'] || ''}</td>
                        <td class="p-4 text-center font-bold text-red-600">${drug['孕婦分級'] || ''}</td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
