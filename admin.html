<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本院用藥查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <header class="bg-[#1e40af] text-white shadow-md sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                📱 本院用藥查詢系統
            </h1>
            <div class="flex items-center gap-4">
                <span class="text-sm opacity-90" id="header-count">共 0 筆藥品</span>
                <a href="admin.html" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-1.5 rounded transition flex items-center gap-1 shadow-sm">
                    後台管理 📝
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-[1600px] mx-auto px-4 mt-4 flex gap-4">
        
        <aside class="w-64 shrink-0 pb-6">
            <span class="text-xs font-semibold text-slate-400 block mb-2 px-2">藥品分類</span>
            <nav class="space-y-1" id="category-menu">
                <button class="w-full text-left bg-blue-50 text-blue-700 font-medium px-3 py-2 rounded-lg text-sm flex justify-between items-center">
                    <span>全部藥品</span>
                    <span class="bg-blue-200 text-blue-800 text-xs px-2 py-0.5 rounded-full" id="side-total-count">0</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 space-y-4">
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-4">
                
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <input type="text" id="main-search" placeholder="🔍 搜尋藥品名稱、學名、商品名或適應症..." 
                               class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition">
                    </div>
                    
                    <select id="sub-category-select" class="border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-600 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">全部細項分類</option>
                    </select>
                </div>

                <div class="flex flex-wrap gap-1 items-center pt-2 border-t border-slate-100" id="alphabet-filter">
                    <button class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-medium" data-letter="ALL">全部</button>
                </div>
            </div>

            <div class="space-y-3" id="drug-list-container">
                <div class="bg-white p-8 rounded-xl text-center text-slate-400 border border-slate-200">
                    正在載入藥品資料，請稍候...
                </div>
            </div>

        </main>
    </div>

    <script>
        let currentDrugsData = []; 
        let searchKeyword = '';
        let selectedLetter = 'ALL';

        // 生成 A~Z 按鈕
        const alphabetContainer = document.getElementById('alphabet-filter');
        const alphabet = ['3', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'K', 'L', 'M', 'N', 'O', 'P', 'Q', 'R', 'S', 'T', 'U', 'V', 'W', 'X', 'Z', 'f'];
        alphabet.forEach(let => {
            const btn = document.createElement('button');
            btn.className = 'border border-slate-200 hover:bg-slate-100 text-slate-600 px-2.5 py-1 rounded text-xs font-mono font-medium transition bg-white cursor-pointer';
            btn.textContent = let;
            btn.setAttribute('data-letter', let);
            alphabetContainer.appendChild(btn);
        });

        // 讀取 JSON
        window.addEventListener('DOMContentLoaded', () => {
            fetch('drugs.json')
                .then(res => res.json())
                .then(data => {
                    currentDrugsData = data;
                    document.getElementById('header-count').textContent = `共 ${data.length} 筆藥品`;
                    document.getElementById('side-total-count').textContent = data.length;
                    applyFilterAndRender();
                });
        });

        // 監聽單一主搜尋框：一個字串同時比對多個欄位
        document.getElementById('main-search').addEventListener('input', (e) => {
            searchKeyword = e.target.value.toLowerCase().trim();
            applyFilterAndRender();
        });

        // 字母篩選
        alphabetContainer.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') {
                Array.from(alphabetContainer.children).forEach(btn => {
                    btn.className = 'border border-slate-200 hover:bg-slate-100 text-slate-600 px-2.5 py-1 rounded text-xs font-mono font-medium transition bg-white cursor-pointer';
                });
                e.target.className = 'bg-blue-600 text-white px-2.5 py-1 rounded text-xs font-mono font-medium cursor-pointer';
                selectedLetter = e.target.getAttribute('data-letter');
                applyFilterAndRender();
            }
        });

        // 核心篩選與渲染
        function applyFilterAndRender() {
            let filtered = currentDrugsData;

            // 後台同款的多欄位.some()篩選邏輯，一格抵兩格
            if (searchKeyword) {
                filtered = filtered.filter(d => {
                    return [d['藥品名稱'], d['藥品中文名'], d['學名名稱'], d['藥理作用'], d['適應症']]
                           .some(f => (f || '').toString().toLowerCase().includes(searchKeyword));
                });
            }

            if (selectedLetter !== 'ALL') {
                filtered = filtered.filter(d => {
                    const firstChar = (d['藥品名稱'] || '').toString().trim().charAt(0).toUpperCase();
                    return firstChar === selectedLetter;
                });
            }

            renderDrugCards(filtered);
        }

        function renderDrugCards(data) {
            const container = document.getElementById('drug-list-container');
            if (data.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-xl text-center text-slate-400 border border-slate-200">找不到符合條件的藥品</div>`;
                return;
            }

            container.innerHTML = data.map(drug => {
                const pregClass = drug['孕婦分級'] ? `<span class="bg-pink-100 text-pink-700 px-1.5 py-0.5 rounded text-xs font-bold">孕${drug['孕婦分級']}</span>` : '';
                const code = (drug['藥品名稱'] || 'DRUG').toString().substring(0, 3).toUpperCase();
                return `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:border-blue-300 transition flex items-start gap-4">
                        <div class="bg-blue-50 text-blue-600 font-bold px-2.5 py-1 rounded text-xs font-mono shrink-0 mt-1">${code}</div>
                        <div class="flex-1 space-y-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h3 class="font-bold text-slate-900 text-base">${drug['藥品名稱'] || ''}</h3>
                                <span class="text-sm text-slate-500">${drug['藥品中文名'] || ''}</span>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap text-xs text-slate-500">
                                <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded">${drug['藥理作用'] || ''}</span>
                                ${pregClass}
                            </div>
                            <p class="text-sm text-slate-600 pt-1">${drug['適應症'] || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
