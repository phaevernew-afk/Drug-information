<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用藥管理後台</title>
    <!-- 引入 Tailwind CSS 樣式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 引入關鍵套件：SheetJS 讓網頁能直接讀取 Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-16">

    <!-- 頂部導覽列（降低管理後台的突兀感，改為簡約清新風格） -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <h1 class="text-lg font-bold text-slate-600 flex items-center gap-2">
                ⚙️ 藥品資料維護面板
            </h1>
            <a href="index.html" class="text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm">
                ← 返回查詢大廳
            </a>
        </div>
    </header>

    <!-- 主操作區 -->
    <main class="max-w-7xl mx-auto px-4 mt-6">
        
        <!-- 工具列：整合所有操作與搜尋 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-4 flex flex-col md:flex-row justify-between items-stretch md:items-center gap-4">
            
            <!-- 左側：多合一整合型搜尋框與計數 -->
            <div class="flex items-center gap-3 flex-1">
                <div class="relative flex-1 max-w-md">
                    <input type="text" id="admin-search" placeholder="輸入藥名、中文、學名、分類或適應症搜尋..." 
                           class="w-full border border-slate-300 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="absolute left-3 top-2.5 text-slate-400 text-xs">🔍</span>
                </div>
                <span class="text-sm font-semibold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md shrink-0" id="admin-count">
                    共 0 筆
                </span>
            </div>

            <!-- 右側：檔案匯入與匯出按鈕區 -->
            <div class="flex items-center gap-2 shrink-0">
                <!-- 隱藏的實際 File Input -->
                <input type="file" id="excel-file-input" accept=".xls,.xlsx" class="hidden">
                <button onclick="document.getElementById('excel-file-input').click()" 
                        class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1.5 shadow-sm cursor-pointer">
                    📊 匯入 Excel
                </button>

                <button id="import-json-btn" class="border border-slate-300 hover:bg-slate-100 text-slate-600 px-3 py-2 rounded-lg text-sm font-medium transition">
                    ⬆️ 備份 JSON
                </button>

                <div class="h-6 w-[1px] bg-slate-200 mx-1"></div>

                <button id="export-json-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1.5 shadow-sm cursor-pointer">
                    📥 匯出新 JSON
                </button>
            </div>
        </div>

        <!-- 藥品數據表格 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 border-b border-slate-200 text-xs font-semibold uppercase tracking-wider">
                            <th class="p-4 w-16">ID</th>
                            <th class="p-4">藥品名稱</th>
                            <th class="p-4">中文名</th>
                            <th class="p-4">學名</th>
                            <th class="p-4">分類 (藥理作用)</th>
                            <th class="p-4">適應症</th>
                            <th class="p-4 w-20 text-center">孕婦</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-slate-400">目前暫無資料，請點擊上方按鈕匯入 Excel 檔案。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 下放到最底部、樣式淡化不顯眼的系統說明指引 -->
        <footer class="mt-8 border-t border-slate-200/60 pt-4 text-xs text-slate-400 leading-relaxed max-w-3xl mx-auto text-center">
            <p>💡 <strong>維護指引：</strong> 本頁面數據於瀏覽器暫存中運作。請點擊「匯入 Excel」選取最新藥品檔，確認清單無誤後，點擊「匯出新 JSON」將下載的 <code>drugs.json</code> 覆蓋回 GitHub 專案庫中即可完成全院發佈。</p>
        </footer>

    </main>

    <script>
        let currentDrugsData = [];

        // 監聽 Excel 檔案上傳
        document.getElementById('excel-file-input').addEventListener('change', handleExcelUpload);
        
        // 監聽 匯出 JSON 按鈕
        document.getElementById('export-json-btn').addEventListener('click', exportJsonFile);

        // 監聽 匯入 JSON 按鈕 (保留備份讀取功能)
        document.getElementById('import-json-btn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        currentDrugsData = JSON.parse(event.target.result);
                        renderAdminTable(currentDrugsData);
                    } catch(err) { alert('JSON 格式解析錯誤！'); }
                };
                reader.readAsText(file);
            };
            input.click();
        });

        // 整合一體化搜尋監聽（同時比對五個重要藥品屬性欄位）
        document.getElementById('admin-search').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase().trim();
            if(!kw) {
                renderAdminTable(currentDrugsData);
                return;
            }
            const filtered = currentDrugsData.filter(d => {
                return [d['藥品名稱'], d['藥品中文名'], d['學名名稱'], d['藥理作用'], d['適應症']]
                       .some(f => (f || '').toString().toLowerCase().includes(kw));
            });
            renderAdminTable(filtered, false); // 只進行畫面即時篩選，不更動左側資料庫總計數值
        });

        // 處理 Excel 檔案讀取
        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // 優先尋找名稱叫作「藥品」的工作表，找不到就抓第一張
                const sheetName = workbook.SheetNames.includes('藥品') ? '藥品' : workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // 將 Excel 轉換成 JSON 陣列物件
                const rawJson = XLSX.utils.sheet_to_json(worksheet);
                
                if (rawJson.length === 0) {
                    alert('Excel 內沒有發現任何有效資料！');
                    return;
                }

                currentDrugsData = rawJson;
                renderAdminTable(currentDrugsData);
                alert(`Excel 讀取完畢！共成功載入 ${currentDrugsData.length} 筆藥品，您可以進行即時搜尋核對。`);
            };
            reader.readAsArrayBuffer(file);
            e.target.value = ''; // 清空以利重複觸發
        }

        // 渲染後台表格
        function renderAdminTable(data, updateCount = true) {
            const tbody = document.getElementById('admin-table-body');
            if(updateCount) {
                document.getElementById('admin-count').textContent = `共 ${data.length} 筆`;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-slate-400">找不到符合搜尋條件的資料</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(drug => {
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-mono text-slate-400">${drug['識別碼'] || ''}</td>
                        <td class="p-4 font-medium text-slate-900">${drug['藥品名稱'] || ''}</td>
                        <td class="p-4 text-slate-700">${drug['藥品中文名'] || ''}</td>
                        <td class="p-4 text-slate-600 text-xs font-mono">${drug['學名名稱'] || ''}</td>
                        <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs">${drug['藥理作用'] || ''}</span></td>
                        <td class="p-4 text-slate-500 max-w-xs truncate" title="${drug['適應症'] || ''}">${drug['適應症'] || ''}</td>
                        <td class="p-4 text-center font-bold text-red-600 text-xs">${drug['孕婦分級'] || ''}</td>
                    </tr>
                `;
            }).join('');
        }

        // 匯出成網頁所需的 drugs.json 檔案
        function exportJsonFile() {
            if (currentDrugsData.length === 0) {
                alert('目前無暫存資料可供匯出，請先匯入 Excel 檔案。');
                return;
            }
            
            const jsonString = JSON.stringify(currentDrugsData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = "drugs.json";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
